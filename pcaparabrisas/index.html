  <style>
/* ============================================
   PCA Parabrisas — Link na Bio
   style.css
   ============================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: #e8e4df;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 28px 16px 48px;
  color: #1a1a1a;
}

/* ── CARD ── */
.page {
  width: 100%;
  max-width: 420px;
  background: #f7f5f2;
  border-radius: 24px;
  box-shadow: 0 4px 32px rgba(0,0,0,.1), 0 1px 4px rgba(0,0,0,.06);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 32px;
}

/* ── HEADER ── */
.header {
  width: 100%;
  padding: 44px 24px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.avatar {
  width: 86px; height: 86px;
  border-radius: 50%;
  overflow: hidden;
  margin-bottom: 16px;
  border: 3px solid #fff;
  box-shadow: 0 2px 12px rgba(0,0,0,.1);
  background: #fff;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }

.brand  { font-size: 20px; font-weight: 800; color: #1a1a1a; letter-spacing: -.3px; }
.slogan { font-size: 13px; color: #888; margin-top: 4px; font-weight: 500; }

.location {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 12px;
  font-size: 12px; color: #aaa; font-weight: 500;
  text-decoration: none;
  transition: color .2s;
}
.location:hover { color: #c0392b; }
.location svg { flex-shrink: 0; }

/* ── ACTION ROW ── */
.actions {
  display: flex; gap: 10px;
  width: calc(100% - 48px);
  margin-bottom: 20px;
}
.btn-action {
  flex: 1;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  height: 44px;
  border-radius: 99px;
  font-family: 'Nunito'; font-size: 13px; font-weight: 700;
  text-decoration: none;
  transition: all .18s;
  border: none; cursor: pointer;
}
.btn-save {
  background: #c0392b;
  color: #fff;
}
.btn-save:hover { background: #a93226; }
.btn-call {
  background: #fff;
  color: #1a1a1a;
  border: 1.5px solid #e0e0e0;
}
.btn-call:hover { border-color: #bbb; background: #fafafa; }

/* ── LINKS ── */
.links {
  width: calc(100% - 48px);
  display: flex; flex-direction: column; gap: 9px;
}

.link {
  display: flex; align-items: center; gap: 13px;
  padding: 13px 16px;
  border-radius: 14px;
  background: #fff;
  border: 1.5px solid #ebebeb;
  text-decoration: none;
  color: #1a1a1a;
  font-size: 14px; font-weight: 700;
  transition: all .18s;
  animation: up .4s both;
}
.link:hover {
  border-color: #d0d0d0;
  box-shadow: 0 4px 14px rgba(0,0,0,.07);
  transform: translateY(-1px);
}
.link:active { transform: scale(.99); }

.link-icon {
  width: 36px; height: 36px; flex-shrink: 0;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
}
.link-label { flex: 1; }
.link-sub {
  font-size: 11px; font-weight: 500; color: #aaa;
  display: block; margin-top: 1px;
}
.link-arrow { color: #ccc; font-size: 18px; font-weight: 400; transition: transform .18s; }
.link:hover .link-arrow { transform: translateX(3px); color: #999; }

/* ── ICON COLORS ── */
.ic-wa   { background: #e8f8ee; color: #25d366; }
.ic-ig   { background: #fdeef6; color: #e1306c; }
.ic-map  { background: #eef3ff; color: #4285f4; }
.ic-star { background: #fffbea; color: #f5b400; }
.ic-pix  { background: #e8f8f5; color: #00b38f; }
.ic-site { background: #f3f3f3; color: #555; }
.ic-mail { background: #f0eeff; color: #7c3aed; }
.ic-yt   { background: #fff0f0; color: #ff0000; }
.ic-tel  { background: #efffef; color: #2e7d32; }

/* ── DIVIDER ── */
.sep {
  width: calc(100% - 48px);
  height: 1px;
  background: #ebebeb;
  margin: 22px 0 20px;
}

/* ── CLICA.AI BANNER ── */
.clica-wrap { width: calc(100% - 48px); }
.clica {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px;
  border-radius: 12px;
  border: 1.5px solid #ebebeb;
  background: #fff;
  text-decoration: none;
  transition: all .18s;
}
.clica:hover {
  border-color: #d4b8ff;
  box-shadow: 0 2px 10px rgba(124,58,237,.08);
}
.clica img {
  width: 28px; height: 28px; object-fit: contain; flex-shrink: 0;
  opacity: .75;
}
.clica-text { flex: 1; line-height: 1.3; }
.clica-text small {
  font-size: 10px; font-weight: 600; color: #bbb;
  text-transform: uppercase; letter-spacing: 1px;
  display: block;
}
.clica-text span { font-size: 12px; font-weight: 700; color: #888; }
.clica-text span b { color: #7c3aed; }
.clica-arr { color: #ddd; font-size: 16px; }

/* ── FOOTER ── */
.footer {
  margin-top: 32px;
  font-size: 11px; color: #ccc; font-weight: 500;
  letter-spacing: .3px;
}

/* ── ANIMAÇÕES ── */
@keyframes up {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.links .link:nth-child(1) { animation-delay: .04s }
.links .link:nth-child(2) { animation-delay: .08s }
.links .link:nth-child(3) { animation-delay: .12s }
.links .link:nth-child(4) { animation-delay: .16s }
.links .link:nth-child(5) { animation-delay: .20s }
.links .link:nth-child(6) { animation-delay: .24s }
.links .link:nth-child(7) { animation-delay: .28s }
.links .link:nth-child(8) { animation-delay: .32s }
.links .link:nth-child(9) { animation-delay: .36s }

  </style>
</head>
